<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>D'Black Store — Chat</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖤</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; background: #0b141a; height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  .header { background: #202c33; padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; border-bottom: 1px solid #2a3942; }
  .header .avatar { width: 40px; height: 40px; border-radius: 50%; background: #00a884; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .header .info { flex: 1; }
  .header .name { font-size: 16px; font-weight: 600; color: #e9edef; }
  .header .status { font-size: 12px; color: #8696a0; }

  /* Chat area */
  .chat { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px 16px; background: #0b141a; }
  .chat::-webkit-scrollbar { width: 6px; }
  .chat::-webkit-scrollbar-thumb { background: #374045; border-radius: 3px; }

  /* Messages */
  .msg-row { display: flex; margin-bottom: 2px; }
  .msg-row.me { justify-content: flex-end; }
  .msg-row.them { justify-content: flex-start; }
  .msg { max-width: 85%; padding: 6px 7px 8px 9px; border-radius: 7.5px; box-shadow: 0 1px .5px rgba(11,20,26,.13); word-break: break-word; position: relative; }
  .msg-row.me .msg { background: #005c4b; border-radius: 7.5px 7.5px 0 7.5px; }
  .msg-row.them .msg { background: #202c33; border-radius: 7.5px 7.5px 7.5px 0; }
  .msg .sender { font-size: 12.8px; font-weight: 700; color: #1fa855; margin-bottom: 2px; }
  .msg .text { font-size: 14.2px; line-height: 1.45; color: #e9edef; white-space: pre-wrap; overflow-wrap: anywhere; }
  .msg .text a { color: #53bdeb; text-decoration: underline; }
  .msg .meta { display: flex; align-items: center; justify-content: flex-end; gap: 4px; margin-top: 2px; }
  .msg .time { font-size: 11px; color: rgba(233,237,239,.6); }
  .msg img.media { max-width: 100%; max-height: 280px; border-radius: 6px; margin-bottom: 4px; cursor: pointer; }
  .msg .caption { font-size: 13px; color: #e9edef; }

  /* Date separator */
  .date-sep { text-align: center; margin: 12px 0; }
  .date-sep span { background: #182229; color: #8696a0; font-size: 12px; padding: 5px 12px; border-radius: 8px; }

  /* Welcome */
  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; flex: 1; }
  .welcome .logo { font-size: 48px; margin-bottom: 16px; }
  .welcome h2 { color: #e9edef; font-size: 20px; margin-bottom: 8px; }
  .welcome p { color: #8696a0; font-size: 14px; max-width: 300px; line-height: 1.5; }
  .welcome input { margin-top: 16px; padding: 10px 16px; border-radius: 8px; border: 1px solid #2a3942; background: #2a3942; color: #e9edef; font-size: 16px; width: 100%; max-width: 280px; text-align: center; font-family: inherit; outline: none; }
  .welcome input::placeholder { color: #8696a0; }
  .welcome button { margin-top: 12px; padding: 10px 32px; border-radius: 8px; border: none; background: #00a884; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .welcome button:active { background: #008f72; }

  /* Input area */
  .input-area { background: #202c33; padding: 8px 12px; display: flex; align-items: flex-end; gap: 8px; flex-shrink: 0; border-top: 1px solid #2a3942; }
  .input-area textarea { flex: 1; border: none; background: #2a3942; color: #e9edef; padding: 10px 14px; border-radius: 8px; font-size: 15px; font-family: inherit; resize: none; outline: none; max-height: 120px; min-height: 42px; line-height: 1.4; }
  .input-area textarea::placeholder { color: #8696a0; }
  .input-area .btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: #00a884; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .input-area .btn:active { background: #008f72; }
  .input-area .btn.img-btn { background: transparent; color: #8696a0; }
  .input-area .btn.img-btn:active { color: #e9edef; }

  /* Typing indicator */
  .typing { padding: 4px 16px; color: #00a884; font-size: 12px; display: none; flex-shrink: 0; background: #0b141a; }
  .typing.show { display: block; }

  /* Image viewer */
  .img-viewer { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.9); display: none; align-items: center; justify-content: center; z-index: 100; }
  .img-viewer.show { display: flex; }
  .img-viewer img { max-width: 95%; max-height: 90%; object-fit: contain; }
  .img-viewer .close { position: absolute; top: 12px; right: 16px; color: #fff; font-size: 28px; cursor: pointer; background: none; border: none; }

  /* Connection status */
  .conn-status { background: #ffc107; color: #000; text-align: center; font-size: 12px; padding: 4px; display: none; flex-shrink: 0; }
  .conn-status.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="avatar">D</div>
  <div class="info">
    <div class="name">D'Black Store</div>
    <div class="status" id="headerStatus">Online</div>
  </div>
</div>

<div class="conn-status" id="connStatus">Reconectando...</div>
<div class="typing" id="typingIndicator">digitando...</div>

<div class="chat" id="chatArea"></div>

<!-- Tela de boas-vindas (pede o nome) -->
<div class="welcome" id="welcomeScreen" style="display:none">
  <div class="logo">🖤</div>
  <h2>D'Black Store</h2>
  <p>Olá! Para iniciar o atendimento, nos diga seu nome:</p>
  <input type="text" id="nameInput" placeholder="Seu nome" maxlength="50" autocomplete="name">
  <button id="startBtn" onclick="startChat()">Iniciar conversa</button>
</div>

<div class="input-area" id="inputArea" style="display:none">
  <input type="file" id="imgInput" accept="image/*" style="display:none">
  <button class="btn img-btn" onclick="document.getElementById('imgInput').click()" title="Enviar imagem">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M1.816 15.556v.002c0 1.502.584 2.912 1.646 3.972s2.472 1.647 3.974 1.647a5.58 5.58 0 0 0 3.972-1.645l9.547-9.548c.769-.768 1.147-1.767 1.058-2.817-.079-.968-.548-1.927-1.319-2.698-1.594-1.592-4.068-1.711-5.517-.262l-7.916 7.915c-.881.881-.792 2.25.214 3.261.501.501 1.134.809 1.751.853.605.043 1.198-.17 1.638-.611l5.845-5.845c.195-.195.195-.512 0-.707a.5.5 0 0 0-.707 0l-5.845 5.845a.909.909 0 0 1-.667.252 1.462 1.462 0 0 1-1.048-.567c-.574-.574-.61-1.277-.112-1.773l7.916-7.916c.987-.987 2.694-.884 3.811.234.545.544.896 1.234.951 1.896.063.712-.185 1.397-.697 1.909l-9.548 9.548a3.585 3.585 0 0 1-2.559 1.06A3.59 3.59 0 0 1 4.17 18.12a3.585 3.585 0 0 1-1.06-2.559v-.003c0-.97.379-1.881 1.06-2.563l7.589-7.588a.5.5 0 0 0-.707-.707l-7.59 7.588a4.57 4.57 0 0 0-1.346 3.26z"/></svg>
  </button>
  <textarea id="msgInput" placeholder="Mensagem" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="btn" onclick="sendMessage()" id="sendBtn">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="#fff"><path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"/></svg>
  </button>
</div>

<div class="img-viewer" id="imgViewer" onclick="this.classList.remove('show')">
  <button class="close">&times;</button>
  <img id="viewerImg" src="">
</div>

<script>
const API = location.origin;
const CONV_ID = location.pathname.split('/chat/')[1]?.split('?')[0];
const TOKEN = new URLSearchParams(location.search).get('t');
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws/chat?conv=${CONV_ID}&token=${TOKEN}`;

let senderName = localStorage.getItem('dblack_chat_name') || '';
let ws = null;
let messages = [];

// Inicialização
if (senderName) {
  showChat();
} else {
  document.getElementById('welcomeScreen').style.display = 'flex';
  document.getElementById('chatArea').style.display = 'none';
  document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') startChat(); });
}

function startChat() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  senderName = name;
  localStorage.setItem('dblack_chat_name', name);
  showChat();
}

async function showChat() {
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('chatArea').style.display = 'block';
  document.getElementById('inputArea').style.display = 'flex';
  await loadMessages();
  connectWS();
  document.getElementById('msgInput').focus();
}

// Carrega mensagens existentes
async function loadMessages() {
  try {
    const res = await fetch(`${API}/api/webchat/${CONV_ID}/messages?t=${TOKEN}`);
    const data = await res.json();
    messages = data.messages || [];
    renderMessages();
  } catch (e) { console.error('Erro ao carregar:', e); }
}

// WebSocket para tempo real
function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onmessage = (evt) => {
    try {
      const { event, data } = JSON.parse(evt.data);
      if (event === 'new_message' && data.message) {
        if (!messages.find(m => m.id === data.message.id)) {
          messages.push(data.message);
          renderMessages(true);
          if (data.message.from_me) playNotif();
        }
      }
      if (event === 'typing') {
        const el = document.getElementById('typingIndicator');
        el.classList.add('show');
        clearTimeout(el._timer);
        el._timer = setTimeout(() => el.classList.remove('show'), 3000);
      }
    } catch {}
  };
  ws.onclose = () => {
    document.getElementById('connStatus').classList.add('show');
    setTimeout(connectWS, 3000);
  };
  ws.onopen = () => {
    document.getElementById('connStatus').classList.remove('show');
  };
}

// Renderiza mensagens
function renderMessages(scroll = true) {
  const chat = document.getElementById('chatArea');
  let html = '';
  let lastDate = '';

  for (const msg of messages) {
    const d = new Date(msg.timestamp);
    const dateStr = d.toLocaleDateString('pt-BR');
    if (dateStr !== lastDate) {
      html += `<div class="date-sep"><span>${dateStr === new Date().toLocaleDateString('pt-BR') ? 'Hoje' : dateStr}</span></div>`;
      lastDate = dateStr;
    }

    const isMe = !msg.from_me;
    const time = d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    const cls = isMe ? 'me' : 'them';

    let body = '';
    if (msg.media_type === 'image') {
      const imgSrc = msg.media_url || msg.content?.split('|')[0];
      const caption = msg.content?.includes('|') ? msg.content.split('|')[1] : '';
      if (imgSrc && (imgSrc.startsWith('/media/') || imgSrc.startsWith('http'))) {
        body += `<img class="media" src="${imgSrc}" onclick="viewImage('${imgSrc}')" onerror="this.style.display='none'">`;
      }
      if (caption) body += `<div class="caption">${esc(caption)}</div>`;
    } else {
      body = `<div class="text">${linkify(esc(msg.content || ''))}</div>`;
    }

    const senderLabel = !isMe && msg.sender ? `<div class="sender">${esc(msg.sender)}</div>` : '';

    html += `<div class="msg-row ${cls}"><div class="msg">${senderLabel}${body}<div class="meta"><span class="time">${time}</span></div></div></div>`;
  }

  chat.innerHTML = html;
  if (scroll) setTimeout(() => chat.scrollTop = chat.scrollHeight, 50);
}

// Enviar mensagem
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  autoResize(input);

  // Adiciona localmente para feedback instantâneo
  const tempMsg = { id: 'temp_' + Date.now(), from_me: false, sender: senderName, content: text, timestamp: new Date().toISOString() };
  messages.push(tempMsg);
  renderMessages(true);

  try {
    const res = await fetch(`${API}/api/webchat/${CONV_ID}/send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: text, token: TOKEN, sender_name: senderName }),
    });
    const msg = await res.json();
    // Substitui msg temporária pela real
    messages = messages.map(m => m.id === tempMsg.id ? msg : m);
  } catch (e) {
    console.error('Erro ao enviar:', e);
  }
}

// Enviar imagem
document.getElementById('imgInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  const form = new FormData();
  form.append('image', file);
  form.append('token', TOKEN);
  form.append('sender_name', senderName);

  try {
    const res = await fetch(`${API}/api/webchat/${CONV_ID}/send-image`, { method: 'POST', body: form });
    const msg = await res.json();
    if (!messages.find(m => m.id === msg.id)) {
      messages.push(msg);
      renderMessages(true);
    }
  } catch (e) { console.error('Erro ao enviar imagem:', e); }
});

// Helpers
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function linkify(text) {
  return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function viewImage(src) {
  document.getElementById('viewerImg').src = src;
  document.getElementById('imgViewer').classList.add('show');
}

function playNotif() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 800; gain.gain.value = 0.1;
    osc.start(); osc.stop(ctx.currentTime + 0.1);
  } catch {}
}

function fmt(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}
</script>
</body>
</html>
